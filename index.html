<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filmposter</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

    <header>
        <h1>Lichtburg Poster Archiv</h1>

        <div class="search-container">
            <input type="text" id="searchField" placeholder="Poster suchen..." autocomplete="off">
            <div id="suggestions" class="suggestions-list"></div>
        </div>

        <div class="filter-bar">
            <select id="filterGenre">
                <option value="">Alle Genres</option>
            </select>

            <select id="filterYear">
                <option value="">📅 Alle Jahre</option>
            </select>

            <button id="resetFilter">✕ Filter zurücksetzen</button>
        </div>
    </header>

    <main>

        <section class="latest-section">
            <h2 class="section-title">Neu im Archiv</h2>
            <div id="latestGrid" class="grid-latest"></div>
        </section>

        <hr class="separator">

        <section>
            <h2 class="section-title">Alle Poster</h2>
            <div id="posterGrid" class="grid"></div>
        </section>

    </main>

    <div id="posterModal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
